name: Release Service
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/core/**"
      - "!**/terraform/**"
      - ".github/workflows/release-service.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
  workflow_dispatch:

jobs:
  release:
    name: Release Service
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # This can only be triggered from main

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - id: auth-gcp
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/196494084534/locations/global/workloadIdentityPools/github-actions-wi-pool/providers/github-actions-wi-provider"
          service_account: "github-actions@zuplo-marketing.iam.gserviceaccount.com"
          access_token_lifetime: "300s"

      - name: Login to Google Registry
        uses: docker/login-action@v2
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth-gcp.outputs.access_token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            us-docker.pkg.dev/zuplo-marketing/docker-registry/rate-my-openapi-api
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=long

      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_AUTH_TOKEN=${{ secrets.GH_NPM_PACKAGE_READ_TOKEN }}

      - uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: rate-my-openapi
          image: us-docker.pkg.dev/zuplo-marketing/docker-registry/rate-my-openapi-api:latest
          # Cost-optimized sizing (traffic is ~20-70 requests/day; p99 usage was
          # ~2% of 2 vCPU and ~140MiB of 2GiB before this change):
          # - scale to zero instead of keeping a 2vCPU/2GiB instance warm 24/7
          # - 1 vCPU / 1GiB is ample headroom for spectral/vacuum linting
          # - keep instance-based billing (--no-cpu-throttling): /upload kicks off
          #   runRatingWorker() AFTER the response is sent, so CPU must stay
          #   allocated between requests while a report is being generated
          # - --cpu-boost softens cold starts now that min-instances is 0
          #
          # Secrets live in Secret Manager (rate-my-openapi-* secrets in
          # zuplo-marketing) and are wired in as env vars via --set-secrets;
          # the runtime SA has secretAccessor on each. --remove-env-vars strips
          # the legacy plaintext copies (and the dead GOOGLE_SERVICE_ACCOUNT_B64
          # and INNGEST_* vars); it tolerates already-absent names, so it stays
          # here to keep plaintext secrets from ever being reintroduced.
          flags: >-
            --cpu=1 --memory=1Gi --min-instances=0 --max-instances=3
            --concurrency=80 --no-cpu-throttling --cpu-boost
            --remove-env-vars=GOOGLE_SERVICE_ACCOUNT_B64,INNGEST_EVENT_KEY,INNGEST_SIGNING_KEY,OPENAI_API_KEY,SENDGRID_API_KEY,SLACK_TOKEN,POSTHOG_KEY
            --set-secrets=OPENAI_API_KEY=rate-my-openapi-openai-api-key:latest,SENDGRID_API_KEY=rate-my-openapi-sendgrid-api-key:latest,SLACK_TOKEN=rate-my-openapi-slack-token:latest,POSTHOG_KEY=rate-my-openapi-posthog-key:latest
